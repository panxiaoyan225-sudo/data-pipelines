name: Data Pipeline ETL

on:
  push:
    branches:
      - main
  schedule:
    # Daily run at 09:05 AM Ottawa (13:05 UTC)
    - cron: '5 13 * * *'
  workflow_dispatch: # Keep this so you can still run it manually

jobs:
  run-etl:
    # This tells GitHub to run on your local laptop runner
    runs-on: [self-hosted, MyLocalLaptop]

    env:
      # Cursor venv Python (C:\Python\venv)
      # Using a virtual environment (venv) ensures isolated Python and package dependencies for this pipeline.
      # This minimizes dependency conflicts, creates reproducible builds, and avoids polluting the global Python install.
      PYTHON_EXE: 'C:\Python\venv\Scripts\python.exe'
      PYTHONUTF8: 1

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: cmd
        run: |
          "${{ env.PYTHON_EXE }}" -m pip install --upgrade pip
          if exist requirements.txt (
              "${{ env.PYTHON_EXE }}" -m pip install -r requirements.txt
          )

      - name: Run ETL Scripts
        shell: cmd
        run: |
          "${{ env.PYTHON_EXE }}" .\pipeline_py\titanic_pipeline.py
          "${{ env.PYTHON_EXE }}" .\pipeline_py\ranking_pipeline.py
          "${{ env.PYTHON_EXE }}" .\pipeline_py\auditor.py
          "${{ env.PYTHON_EXE }}" .\pipeline_py\dup_pipelines.py
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          EXPORT_PATH: ${{ github.workspace }}\exports

      - name: Notify Slack on Success
        if: success()
        shell: cmd
        run: |
          "${{ env.PYTHON_EXE }}" .\pipeline_py\SLACK.py "✅ ETL Pipeline Completed Successfully! All data models updated."
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}

      - name: Notify Slack on Failure
        if: failure()
        shell: cmd
        run: |
          "${{ env.PYTHON_EXE }}" .\pipeline_py\SLACK.py "🔴 ETL Pipeline Failed! Check the GitHub Actions logs for details."
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
