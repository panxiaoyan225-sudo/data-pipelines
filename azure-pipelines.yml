trigger:
  branches:
    include:
      - main

pool:
  name: 'MyLocalLaptop'

variables:
  # This line imports all variable secrets from the Azure DevOps variable group named 'Pipeline-Secrets'
  - group: 'Pipeline-Secrets'
  - name: pythonPath
    # Using a virtual environment (venv) ensures isolated Python and package dependencies for this pipeline.
    # This minimizes conflicts, creates reproducible builds, and avoids polluting the global Python install.
    value: 'C:\\Python\\venv\\Scripts\\python.exe'

steps:
  - checkout: self
    clean: true

  - script: |
      "$(pythonPath)" -m pip install --upgrade pip
      if exist requirements.txt (
          "$(pythonPath)" -m pip install -r requirements.txt
      )
    displayName: 'Install dependencies'

  - script: |
      "$(pythonPath)" .\pipeline_py\titanic_pipeline.py
      "$(pythonPath)" .\pipeline_py\ranking_pipeline.py
      "$(pythonPath)" .\pipeline_py\auditor.py
      "$(pythonPath)" .\pipeline_py\dup_pipelines.py
    env:
      PYTHONUTF8: 1
      DB_USER: $(DB_USER)
      DB_PASS: $(DB_PASS)
      DB_HOST: $(DB_HOST)
      DB_PORT: $(DB_PORT)
      DB_NAME: $(DB_NAME)
      SLACK_TOKEN: $(SLACK_TOKEN)
      EXPORT_PATH: $(Pipeline.Workspace)\exports
    displayName: 'Run ETL Scripts'

  # --- NEW: SUCCESS NOTIFICATION ---
  - script: |
      "$(pythonPath)" .\pipeline_py\SLACK.py "✅ ETL Pipeline Completed Successfully! All data models updated."
    env:
      SLACK_TOKEN: $(SLACK_TOKEN)
      PYTHONUTF8: 1
    displayName: 'Notify Slack on Success'
    condition: succeeded()

  # --- EXISTING: FAILURE NOTIFICATION ---
  - script: |
      "$(pythonPath)" .\pipeline_py\SLACK.py "🔴 ETL Pipeline Failed! Check the Azure DevOps logs for details."
    env:
      SLACK_TOKEN: $(SLACK_TOKEN)
      PYTHONUTF8: 1
    displayName: 'Notify Slack on Failure'
    condition: failed()