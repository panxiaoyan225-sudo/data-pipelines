trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

schedules:
  - cron: "0 2 * * *"
    displayName: "Daily run at 02:00 UTC"
    branches:
      include:
        - main
    always: true

pool:
  name: "MyLocalLaptop" 
  demands:
    - Agent.OS -equals Windows_NT

variables:
  - group: "Pipeline-Secrets"
  - name: venvPath
    value: "C:\Python\venv\Scripts\python.exe"

steps:
  - checkout: self
    clean: true

  # 1. Create the .env file FIRST so the scripts can read it
  - powershell: |
      $envContent = @"
      DB_USER=$(DB_USER)
      DB_PASS=$(DB_PASS)
      DB_HOST=$(DB_HOST)
      DB_PORT=$(DB_PORT)
      DB_NAME=$(DB_NAME)
      SLACK_TOKEN=$(SLACK_TOKEN)
      EXPORT_PATH=$(Pipeline.Workspace)\exports
      "@
      Set-Content -Path ".env" -Value $envContent -Encoding UTF8
    displayName: "Create runtime .env from Azure variables"

  # 2. Prepare the export folder
  - powershell: |
      if (!(Test-Path "$(Pipeline.Workspace)\exports")) {
          New-Item -ItemType Directory -Force -Path "$(Pipeline.Workspace)\exports"
      }
    displayName: "Prepare export directory"

  # 3. Update dependencies in your specific venv
  - script: |
      $(venvPath) -m pip install --upgrade pip
      $(venvPath) -m pip install -r requirements.txt
    displayName: "Update venv dependencies"

  # 4. Run your ETL scripts using the venv
  - script: |
      $(venvPath) .\pipeline_py\titanic_pipeline.py
      $(venvPath) .\pipeline_py\ranking_pipeline.py
      $(venvPath) .\pipeline_py\auditor.py
      $(venvPath) .\pipeline_py\dup_pipelines.py
    displayName: "Run ETL and audit scripts"

  # 5. Notify Slack only if things fail
  - script: |
      $(venvPath) .\pipeline_py\SLACK.py
    displayName: "Notify Slack on Failure"
    condition: failed()