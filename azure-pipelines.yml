trigger:
  branches:
    include:
      - main

schedules:
  - cron: "0 2 * * *"
    displayName: "Daily run at 02:00 UTC"
    branches:
      include:
        - main
    always: true

pool:
  name: 'MyLocalLaptop'

variables:
  - group: 'Pipeline-Secrets'

steps:
  - checkout: self
    clean: true

  # Changed from 3.11 to 3.12 to match your requirement
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.12'
      addToPath: true
    displayName: 'Set Python Version to 3.12'

  - powershell: |
      $envContent = @"
      DB_USER=$(DB_USER)
      DB_PASS=$(DB_PASS)
      DB_HOST=$(DB_HOST)
      DB_PORT=$(DB_PORT)
      DB_NAME=$(DB_NAME)
      SLACK_TOKEN=$(SLACK_TOKEN)
      EXPORT_PATH=$(Pipeline.Workspace)\exports
      "@
      Set-Content -Path ".env" -Value $envContent -Encoding UTF8
    displayName: 'Create runtime .env from Azure variables'

  - powershell: |
      if (!(Test-Path "$(Pipeline.Workspace)\exports")) {
          New-Item -ItemType Directory -Force -Path "$(Pipeline.Workspace)\exports"
      }
    displayName: 'Prepare export directory'

  - script: |
      python -m pip install --upgrade pip
      if exist requirements.txt (
          pip install -r requirements.txt
      )
    displayName: 'Install dependencies'

  - script: |
      python .\pipeline_py\titanic_pipeline.py
      python .\pipeline_py\ranking_pipeline.py
      python .\pipeline_py\auditor.py
      python .\pipeline_py\dup_pipelines.py
    displayName: 'Run ETL and audit scripts'

  - script: |
      python .\pipeline_py\SLACK.py
    env:
      SLACK_TOKEN: $(SLACK_TOKEN)
    displayName: 'Notify Slack on Failure'
    condition: failed()