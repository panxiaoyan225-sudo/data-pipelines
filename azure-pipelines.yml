trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

schedules:
  - cron: "0 2 * * *"
    displayName: "Daily run at 02:00 UTC"
    branches:
      include:
        - main
    always: true

pool:
  name: "MyLocalLaptop" # Change to your self-hosted Windows pool name if different
  demands:
    - Agent.OS -equals Windows_NT

variables:
  - group: "Pipeline-Secrets" # The name you gave the Variable Group in the Library
  - name: pythonVersion
    value: "3.12"

steps:
  - checkout: self
    clean: true

  - task: UsePythonVersion@0
    displayName: "Use Python $(pythonVersion)"
    inputs:
      versionSpec: "$(pythonVersion)"
      addToPath: true
      architecture: "x64"

  - script: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
    displayName: "Install dependencies"

  - powershell: |
      $envContent = @"
      DB_USER=$(DB_USER)
      DB_PASS=$(DB_PASS)
      DB_HOST=$(DB_HOST)
      DB_PORT=$(DB_PORT)
      DB_NAME=$(DB_NAME)
      SLACK_TOKEN=$(SLACK_TOKEN)
      EXPORT_PATH=$(Pipeline.Workspace)\exports
      "@
      Set-Content -Path ".env" -Value $envContent -Encoding UTF8
    displayName: "Create runtime .env from Azure variables"

  - powershell: |
      New-Item -ItemType Directory -Force -Path "$(Pipeline.Workspace)\exports" | Out-Null
    displayName: "Prepare export directory"

  - script: |
      python .\pipeline_py\titanic_pipeline.py
      python .\pipeline_py\ranking_pipeline.py
      python .\pipeline_py\auditor.py
      python .\pipeline_py\dup_pipelines.py
    displayName: "Run ETL and audit scripts"

# --- Notification Step ---
  - script: |
      python .\pipeline_py\SLACK.py
    displayName: "Notify Slack on Failure"
    condition: failed()
    
