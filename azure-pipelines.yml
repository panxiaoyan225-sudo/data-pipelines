trigger:
  branches:
    include:
      - main

schedules:
  - cron: "0 2 * * *"
    displayName: "Daily run at 02:00 UTC"
    branches:
      include:
        - main
    always: true

pool:
  name: 'MyLocalLaptop'

variables:
  - group: 'Pipeline-Secrets'
  # Use double backslashes and the new public path to bypass "Access is denied"
  - name: pythonPath
    value: 'C:\\Python312\\python.exe'

steps:
  - checkout: self
    clean: true

  - powershell: |
      $envContent = @"
      DB_USER=$(DB_USER)
      DB_PASS=$(DB_PASS)
      DB_HOST=$(DB_HOST)
      DB_PORT=$(DB_PORT)
      DB_NAME=$(DB_NAME)
      SLACK_TOKEN=$(SLACK_TOKEN)
      EXPORT_PATH=$(Pipeline.Workspace)\exports
      "@
      Set-Content -Path ".env" -Value $envContent -Encoding UTF8
    displayName: 'Create runtime .env'

  - script: |
      "$(pythonPath)" -m pip install --upgrade pip
      if exist requirements.txt (
          "$(pythonPath)" -m pip install -r requirements.txt
      )
    displayName: 'Install dependencies'

  - script: |
      "$(pythonPath)" .\pipeline_py\titanic_pipeline.py
      "$(pythonPath)" .\pipeline_py\ranking_pipeline.py
      "$(pythonPath)" .\pipeline_py\auditor.py
      "$(pythonPath)" .\pipeline_py\dup_pipelines.py
    displayName: 'Run ETL Scripts'

  - script: |
      "$(pythonPath)" .\pipeline_py\SLACK.py
    env:
      SLACK_TOKEN: $(SLACK_TOKEN)
    displayName: 'Notify Slack on Failure'
    condition: failed()